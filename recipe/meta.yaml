{% set version = "0.9.1" %}

package:
  name: python-elf
  version: {{ version }}

source:
  url: https://github.com/constantinpape/elf/archive/{{ version }}.tar.gz
  sha256: 4803a61efd0ed807ea13f4e33fe68de2cfb4c3a6b1975ba9b7277471d9f324f0

build:
  number: 0
  script: pip install . --no-deps --ignore-installed --no-cache-dir -vvv
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - bioimage-cpp
    - imageio
    - h5py
    - mrcfile
    - numpy
    - pandas
    - pooch
    - scikit-image
    - scikit-learn
    - skan >=0.11.1
    - threadpoolctl
    - zarr
    - z5py >=2.0.10

test:
  requires:
    - python {{ python_min }}
    - requests
  imports:
    - elf
    - elf.io
    - elf.transformation
    - elf.segmentation
  source_files:
    - test/**/*.py
    - data/**
  commands:
    - python -m unittest discover -s test -v

about:
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Utils and convenience functions for large-scale bio-image analysis.
  home: https://github.com/constantinpape/elf

extra:
  recipe-maintainers:
    - constantinpape
